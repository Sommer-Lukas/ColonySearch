# corpus_nodes.toml — defines which JSON files go into each node's SQLite FTS5 database.
#
# Selection rules per node (all are optional and combinable):
#   topics   = list of topic names — matches files whose filename starts with "{topic}__"
#   include  = glob patterns against the filename  (applied after topics)
#   exclude  = glob patterns to remove from the combined selection
#
# A file can appear in multiple nodes' databases — that is intentional, because
# different nodes may specialise in overlapping domains.
#
# Run:  python data/database_setup.py
#       python data/database_setup.py --nodes climate,technology
#       python data/database_setup.py --dry-run

# ── Paths ─────────────────────────────────────────────────────────────────────
[corpus]
dir = "corpus"        # relative to this file

[databases]
dir = "dbs"           # relative to this file; created automatically

# ── Node definitions ──────────────────────────────────────────────────────────
[[node]]
name   = "everything"
topics = ["climate_change", "sustainable_materials", "ml_algorithms", "programming", "quantum_computing", "medicine", "neuroscience", "economics", "football", "space"]


[[node]]
name   = "climate"
topics = ["climate_change", "sustainable_materials"]

[[node]]
name   = "technology"
topics = ["ml_algorithms", "programming", "quantum_computing"]

[[node]]
name   = "life_sciences"
topics = ["medicine", "neuroscience"]

[[node]]
name   = "society"
topics = ["economics", "football", "space"]

# Fine-grained example: arxiv papers only, across all topics
# Uncomment to activate.
#
# [[node]]
# name    = "arxiv_only"
# include = ["*__arxiv_org__*.json"]
#
# Fine-grained example: mix topics + exclude one source host
#
# [[node]]
# name    = "climate_no_nasa"
# topics  = ["climate_change"]
# exclude = ["*__climate_nasa_gov__*.json", "*__www_nasa_gov__*.json"]
