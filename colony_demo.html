<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColonySearch — ACO Network Simulation</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e;
      --blue: #58a6ff; --green: #3fb950; --orange: #f0883e;
      --red: #f85149; --purple: #bc8cff; --yellow: #e3b341;
      --formula-bg: #161d27; --numbers-bg: #0f1923;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      padding: 10px 28px; border-bottom: 1px solid var(--border);
      background: var(--panel); display: flex; align-items: center;
      gap: 20px; flex-shrink: 0;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; color: var(--blue); }
    .badge {
      border-radius: 20px; padding: 3px 14px; font-size: 0.82rem;
      border: 1px solid; display: flex; gap: 6px; align-items: center;
    }
    .badge.query { border-color: var(--orange); color: var(--orange); }
    .badge.entry { border-color: var(--purple); color: var(--purple); }
    .badge span { color: var(--text); font-style: italic; }
    header .hint { margin-left: auto; font-size: 0.78rem; color: var(--muted); }

    /* ── Main layout ──────────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── Graph pane ───────────────────────────────────────────── */
    .graph-pane {
      width: 500px; flex-shrink: 0; border-right: 1px solid var(--border);
      background: #080c10; display: flex; flex-direction: column;
      align-items: center; padding: 14px 10px 10px;
    }
    .graph-pane h2 {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); margin-bottom: 8px;
    }
    #network-svg { width: 460px; height: 460px; }

    .legend {
      display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.74rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; }

    /* ── Step pane ────────────────────────────────────────────── */
    .step-pane {
      flex: 1; overflow-y: auto; padding: 24px 28px 16px;
      display: flex; flex-direction: column; gap: 0;
    }

    /* Step content elements */
    .step-num { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 4px; }
    .step-title { font-size: 1.45rem; font-weight: 700; line-height: 1.25; margin-bottom: 4px; }
    .step-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 16px; }

    .explanation { font-size: 0.9rem; line-height: 1.7; color: #c9d1d9; margin-bottom: 14px; }
    .explanation p { margin-bottom: 8px; }
    .explanation p:last-child { margin-bottom: 0; }
    .explanation strong { color: var(--text); }
    .explanation code { background: #1a2030; padding: 1px 5px; border-radius: 3px; font-size: 0.82rem; color: var(--purple); font-family: 'Courier New', monospace; }

    /* Formula block */
    .fblock {
      background: var(--formula-bg); border: 1px solid var(--border);
      border-left: 3px solid var(--blue); border-radius: 6px;
      padding: 13px 18px; margin-bottom: 13px;
    }
    .fblock-label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--blue); margin-bottom: 8px;
    }
    .formula {
      font-family: 'Courier New', monospace; font-size: 0.95rem;
      color: #cdd6f4; line-height: 2;
    }
    .formula .sym { color: var(--orange); }
    .formula .val { color: var(--green); font-weight: bold; }
    .formula .cmt { color: #5a6a7a; font-size: 0.82rem; }
    .formula .hi { color: var(--yellow); }

    /* Numbers block */
    .nblock {
      background: var(--numbers-bg); border: 1px solid var(--border);
      border-left: 3px solid var(--green); border-radius: 6px;
      padding: 13px 18px; margin-bottom: 13px;
    }
    .nblock-label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--green); margin-bottom: 8px;
    }
    .nblock table { width: 100%; border-collapse: collapse; font-size: 0.84rem; font-family: 'Courier New', monospace; }
    .nblock th { color: var(--muted); font-size: 0.74rem; text-align: left; padding: 3px 8px; border-bottom: 1px solid var(--border); font-family: 'Segoe UI', sans-serif; letter-spacing: 0.5px; }
    .nblock td { padding: 4px 8px; color: #c9d1d9; border-bottom: 1px solid rgba(48,54,61,0.4); }
    .nblock td.g { color: var(--green); font-weight: bold; }
    .nblock td.o { color: var(--orange); font-weight: bold; }
    .nblock td.y { color: var(--yellow); font-weight: bold; }
    .nblock td.b { color: var(--blue); }
    .nblock td.p { color: var(--purple); }
    .calc { font-family: 'Courier New', monospace; font-size: 0.85rem; color: #c9d1d9; line-height: 1.9; }
    .calc .arrow { color: var(--muted); }
    .calc .result { color: var(--green); font-weight: bold; }
    .calc .updated { color: var(--yellow); font-weight: bold; }

    /* ── Nav bar ─────────────────────────────────────────────── */
    .nav-bar {
      border-top: 1px solid var(--border); background: var(--panel);
      padding: 10px 28px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .nav-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text);
      padding: 7px 18px; border-radius: 6px; font-size: 0.88rem; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { background: var(--blue); border-color: var(--blue); color: #fff; }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .step-dots { display: flex; gap: 7px; align-items: center; }
    .sdot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--border);
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .sdot.active { background: var(--blue); transform: scale(1.5); }
    .sdot:hover { background: var(--muted); }
    .step-counter { font-size: 0.82rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* ── SVG element styles ──────────────────────────────────── */
    .edef  { stroke: #1e2d3d; stroke-width: 1.5; fill: none; transition: all 0.35s; }
    .eact  { stroke: var(--blue); stroke-width: 2.5; fill: none; transition: all 0.35s; }
    .eqry  { stroke: var(--orange); stroke-width: 3; fill: none; transition: all 0.35s; }
    .ephr  { stroke: var(--green); stroke-width: 2.5; fill: none; transition: all 0.35s; }

    .ndef  { fill: #111820; stroke: #2a4a6a; stroke-width: 2; transition: all 0.35s; }
    .nact  { fill: #0f2040; stroke: var(--blue); stroke-width: 2.5; transition: all 0.35s; }
    .nent  { fill: #1a0830; stroke: var(--purple); stroke-width: 2.5; transition: all 0.35s; }
    .nqry  { fill: #251400; stroke: var(--orange); stroke-width: 2.5; transition: all 0.35s; }
    .nvis  { fill: #0a2010; stroke: var(--green); stroke-width: 2.5; transition: all 0.35s; }
    .nupd  { fill: #251a00; stroke: var(--yellow); stroke-width: 2.5; transition: all 0.35s; }
    .ngsip { fill: #001a1a; stroke: #4dd0e1; stroke-width: 2.5; transition: all 0.35s; }

    .nlbl  { fill: #4a7fa5; font-size: 12px; font-family: 'Courier New', monospace; dominant-baseline: middle; text-anchor: middle; pointer-events: none; transition: fill 0.35s; font-weight: bold; stroke: none; }
    .nlbl.nact { fill: var(--blue); }
    .nlbl.nent { fill: var(--purple); }
    .nlbl.nqry { fill: var(--orange); }
    .nlbl.nvis { fill: var(--green); }
    .nlbl.nupd { fill: var(--yellow); }
    .nlbl.ngsip { fill: #4dd0e1; }

    .nrep  { fill: #2a3a4a; font-size: 9px; font-family: 'Courier New', monospace; dominant-baseline: middle; text-anchor: middle; pointer-events: none; transition: fill 0.35s; }
    .nrep.changed { fill: var(--yellow); }

    .egsip { stroke: #4dd0e1; stroke-width: 2.5; stroke-dasharray: 5 3; fill: none; transition: all 0.35s; }

    .etau  { fill: var(--green); font-size: 9px; font-family: 'Courier New', monospace; dominant-baseline: middle; text-anchor: middle; pointer-events: none; opacity: 0.45; transition: opacity 0.3s; }
    .etau.show { opacity: 1; fill: var(--orange); font-size: 10px; font-weight: 700; }

    .pulse-ring { fill: none; stroke-width: 2; opacity: 0; }
    .pulse-ring.go { animation: pulse 1.8s ease-out infinite; }
    @keyframes pulse { 0% { r: 26px; opacity: 0.7; } 100% { r: 46px; opacity: 0; } }
  </style>
</head>
<body>

<header>
  <h1>🐜 ColonySearch</h1>
  <div class="badge query">Query: <span>"machine learning"</span></div>
  <div class="badge entry">Entry point: <span>Node 1</span></div>
  <span class="hint">← → arrow keys to navigate</span>
</header>

<div class="main">
  <div class="graph-pane">
    <h2>Network Topology</h2>
    <svg id="network-svg" viewBox="0 0 460 460">
      <defs>
        <marker id="arr-def" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="#1e2d3d"/>
        </marker>
        <marker id="arr-act" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/>
        </marker>
        <marker id="arr-qry" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="var(--orange)"/>
        </marker>
        <marker id="arr-phr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--green)"/>
        </marker>
        <marker id="arr-gsip" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="#4dd0e1"/>
        </marker>
      </defs>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="border-color:#2a4a6a"></div>Default</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:var(--purple)"></div>Entry</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:var(--orange)"></div>Querying</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:var(--green)"></div>Searched</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:var(--yellow)"></div>Rep Updated</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#4dd0e1"></div>Gossip Received</div>
    </div>
    <div style="font-size:0.69rem;color:var(--muted);margin-top:6px;text-align:center">r = Node 1's local rep estimate of each peer</div>
  </div>

  <div class="step-pane" id="step-pane"></div>
</div>

<div class="nav-bar">
  <button id="prev-btn" class="nav-btn" disabled>← Prev</button>
  <div class="step-dots" id="step-dots"></div>
  <button id="next-btn" class="nav-btn">Next →</button>
  <span class="step-counter" id="step-counter">Step 1 / 13</span>
</div>

<script>
// ── Network data ─────────────────────────────────────────────────────────────
const R = 24; // node circle radius
const CX = 230, CY = 230, RAD = 185; // SVG center + layout radius

// Node positions: decagon with Node 1 at top
const NODES = Array.from({length: 10}, (_, i) => {
  const deg = 90 - i * 36;
  const rad = deg * Math.PI / 180;
  return {
    id: i + 1,
    x: Math.round(CX + RAD * Math.cos(rad)),
    y: Math.round(CY - RAD * Math.sin(rad)),
    rep: 1.0,
  };
});

// Undirected edges (seed=42, p=0.4 + spanning tree)
const EDGES = [
  [1,3],[1,4],[1,5],[1,9],
  [2,3],[2,4],[2,6],[2,7],[2,10],
  [3,6],[3,7],[3,9],[3,10],
  [4,6],[4,7],[4,8],
  [5,6],[5,10],
  [6,9],
  [7,10],
  [8,9],[8,10],
  [9,10],
];

// ── Step definitions ─────────────────────────────────────────────────────────
// nodeClass: { nodeId: cssClass }  edgeClass: { "a-b": cssClass }
// showTau: array of edge keys to show τ label  showPulse: nodeId to pulse

const STEPS = [
  // ── 1 ──
  {
    nodeClass: {},
    edgeClass: {},
    showTau: [],
    repValues: {1:1.0,2:1.0,3:1.0,4:1.0,5:1.0,6:1.0,7:1.0,8:1.0,9:1.0,10:1.0},
    tauValues: {},
    html: `
<div class="step-num">Step 1 of 13</div>
<div class="step-title">Initial Network State</div>
<div class="step-sub">Erdős–Rényi random mesh · p = 0.4 · seed = 42 · spanning-tree connected</div>
<div class="explanation">
  <p>The ColonySearch network consists of <strong>10 independent nodes</strong>.
  Each node holds its own <strong>SQLite FTS5 full-text index</strong> and a
  <strong>KNN semantic model</strong> — there is no central server and no shared index.</p>
  <p>Nodes are wired together by a random mesh topology.
  A <strong>spanning-tree pass</strong> guarantees every node is reachable,
  so no query ever gets stranded. There are <strong>23 undirected edges</strong> in total.</p>
  <p>Crucially, <strong>reputation is not a global value</strong>. Each node keeps its own
  <code>_rep_table</code> — a local dictionary of what <em>it</em> believes about its peers.
  After a query, the querying node updates rep for <strong>every peer that returned results</strong>
  in the entire result pool, not just direct neighbours. Beliefs spread further via
  <strong>gossip</strong> to direct neighbours.</p>
  <p>Queries carry a <strong>TTL (time-to-live)</strong> depth budget. When TTL reaches 0 a node
  searches locally only and does not forward — preventing unbounded flooding in large meshes.</p>
</div>
<div class="fblock">
  <div class="fblock-label">Initial Values</div>
  <div class="formula">
    τ<sub>0</sub>(i,j) = <span class="val">1.0</span>  <span class="cmt">// pheromone on every edge (INITIAL_PHEROMONE)</span><br>
    node._rep_table = <span class="val">{}</span>  <span class="cmt">// empty — unknown peers default to 1.0</span>
  </div>
</div>
<div class="nblock">
  <div class="nblock-label">System Constants</div>
  <table>
    <tr><th>Role</th><th>Symbol</th><th>Value</th><th>Meaning</th></tr>
    <tr><td>Pheromone evaporation</td><td class="b">ρ</td><td class="g">0.10</td><td>How fast old trails fade</td></tr>
    <tr><td>Rep. EMA (direct obs.)</td><td class="b">λ</td><td class="g">0.15</td><td>Weight for your own measurement</td></tr>
    <tr><td>Rep. EMA (gossip)</td><td class="b">γ</td><td class="g">0.10</td><td>Weight for hearsay from a neighbor</td></tr>
    <tr><td>Rep. blend weight</td><td class="b">w</td><td class="g">0.20</td><td>Rep influence on final score</td></tr>
    <tr><td>ACO pheromone exponent</td><td class="b">α<sub>aco</sub></td><td class="g">1.0</td><td>Exploitation vs exploration</td></tr>
    <tr><td>ACO rep. exponent</td><td class="b">β<sub>aco</sub></td><td class="g">1.0</td><td>Reputation bias in routing</td></tr>
    <tr><td>Search blend (BM25 weight)</td><td class="b">α<sub>s</sub></td><td class="g">0.51</td><td>BM25 vs KNN balance</td></tr>
    <tr><td>Pheromone floor</td><td class="b">τ<sub>min</sub></td><td class="g">0.01</td><td>No edge fully dies</td></tr>
    <tr><td>Query depth limit</td><td class="b">TTL</td><td class="g">3</td><td>Max hops before a node goes local-only</td></tr>
  </table>
</div>`
  },

  // ── 2 ──
  {
    nodeClass: {1:'nent'},
    edgeClass: {},
    showTau: [],
    showPulse: 1,
    repValues: {1:1.0,2:1.0,3:1.0,4:1.0,5:1.0,6:1.0,7:1.0,8:1.0,9:1.0,10:1.0},
    tauValues: {},
    html: `
<div class="step-num">Step 2 of 13</div>
<div class="step-title">Query Arrives at Node 1</div>
<div class="step-sub">User submits "machine learning" via the Flask /search endpoint</div>
<div class="explanation">
  <p>A user types <strong>"machine learning"</strong> into the search box. The HTTP GET request
  lands on <strong>Node 1</strong> — the fixed entry point
  (<code>myself = _network.get_node_obj("Node_1")</code>).</p>
  <p>Node 1's <code>search()</code> method is called with <code>_visited = None</code> and
  <code>ttl = DEFAULT_TTL = 3</code>, making it the <strong>root node</strong>
  (<code>is_root = True</code>). Rep-blending and deduplication happen <em>only once</em>
  at the root — applying them at every hop would inflate all scores toward 1.0.</p>
  <p>A fresh <code>_visited = set()</code> is created locally. For in-process nodes this set is
  passed by reference so every recursive call shares the same object.
  For <strong>remote HTTP nodes</strong>, <code>_visited</code> is serialised to JSON and sent in
  the request params — each remote process gets a <em>snapshot copy</em>, so cycle state
  travels as data in the message rather than through shared memory.</p>
</div>
<div class="fblock">
  <div class="fblock-label">Entry Flow</div>
  <div class="formula">
    GET /search?query=<span class="hi">"machine learning"</span><br>
    <span class="cmt">↓</span><br>
    Node1.search(query, <span class="sym">_visited=None</span>, <span class="sym">ttl=3</span>)<br>
    &nbsp;&nbsp;is_root = <span class="val">True</span><br>
    &nbsp;&nbsp;_visited = <span class="sym">{}</span>&nbsp;&nbsp;<span class="cmt">// fresh empty set (shared for local, serialised for remote)</span><br>
    &nbsp;&nbsp;ttl = <span class="val">3</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="cmt">// depth budget; reaches 0 → local-only, no forwarding</span>
  </div>
</div>
<div class="nblock">
  <div class="nblock-label">Node 1 State at Query Arrival</div>
  <table>
    <tr><th>Attribute</th><th>Value</th></tr>
    <tr><td>node_id</td><td class="b">"data/dbs/Node_1"</td></tr>
    <tr><td>local</td><td class="g">True</td></tr>
    <tr><td>_rep_table</td><td class="b">{} — all peers unknown, default 1.0</td></tr>
    <tr><td>neighbors</td><td class="b">Node 3, 4, 5, 9</td></tr>
    <tr><td>pheromone (all edges)</td><td class="g">τ = 1.0</td></tr>
    <tr><td>ttl received</td><td class="g">3 (DEFAULT_TTL — root call)</td></tr>
  </table>
</div>`
  },

  // ── 3 ──
  {
    nodeClass: {1:'nact'},
    edgeClass: {},
    showTau: [],
    repValues: {1:1.0,2:1.0,3:1.0,4:1.0,5:1.0,6:1.0,7:1.0,8:1.0,9:1.0,10:1.0},
    tauValues: {},
    html: `
<div class="step-num">Step 3 of 13</div>
<div class="step-title">Node 1: BM25 Full-Text Search</div>
<div class="step-sub">SQLite FTS5 · BM25 scoring · stop-word filtering</div>
<div class="explanation">
  <p>Node 1 first marks itself visited (<code>_visited.add("Node_1")</code>), then queries its
  <strong>SQLite FTS5 index</strong> using BM25 — a probabilistic keyword relevance formula.</p>
  <p>The raw query <strong>"machine learning"</strong> is sanitized: FTS5 special characters
  are stripped and stop-words are removed. Result: tokens <code>["machine", "learning"]</code>.</p>
  <p>FTS5 returns <em>negative</em> BM25 values (lower = better in SQLite). We negate them so
  higher = better, then <strong>min-max normalize</strong> to [0, 1] across the candidate set.</p>
</div>
<div class="fblock">
  <div class="fblock-label">BM25 Formula (per document d, query term t)</div>
  <div class="formula">
    BM25(d) = Σ<sub>t</sub> IDF(t) · <span class="sym">(tf(t,d) · (k₁+1))</span> / <span class="sym">(tf(t,d) + k₁·(1−b+b·|d|/avgDL))</span><br><br>
    <span class="cmt">// FTS5 returns −BM25(d) → we negate: raw = −score(FTS5)</span><br>
    BM25<sub>norm</sub>(d) = (raw(d) − min) / (max − min) <span class="cmt">→ [0, 1]</span>
  </div>
</div>
<div class="nblock">
  <div class="nblock-label">Node 1 · BM25 Results for "machine learning"</div>
  <table>
    <tr><th>Document</th><th>BM25 raw</th><th>BM25 norm</th></tr>
    <tr><td>intro_to_ml.txt</td><td>2.81</td><td class="g">1.000</td></tr>
    <tr><td>neural_networks.txt</td><td>1.65</td><td class="b">0.521</td></tr>
    <tr><td>bitcoin_overview.txt</td><td>0.58</td><td>0.000</td></tr>
  </table>
</div>`
  },

  // ── 4 ──
  {
    nodeClass: {1:'nact'},
    edgeClass: {},
    showTau: [],
    repValues: {1:1.0,2:1.0,3:1.0,4:1.0,5:1.0,6:1.0,7:1.0,8:1.0,9:1.0,10:1.0},
    tauValues: {},
    html: `
<div class="step-num">Step 4 of 13</div>
<div class="step-title">Node 1: KNN Semantic Search</div>
<div class="step-sub">Sentence-transformers · all-mpnet-base-v2 · cosine similarity</div>
<div class="explanation">
  <p>In parallel with BM25, Node 1 encodes the query into a
  <strong>768-dimensional sentence embedding</strong> using <code>all-mpnet-base-v2</code>.
  It then queries its pre-trained <strong>KNN model</strong> (scikit-learn, fitted offline) to find
  the <em>k</em> nearest document vectors by cosine distance.</p>
  <p>Unlike BM25, cosine similarity is already in [0, 1] and carries an

// ── SVG Rendering ─────────────────────────────────────────────────────────────
const svg = document.getElementById('network-svg');
const edgesLayer = document.getElementById('edges-layer');
const nodesLayer = document.getElementById('nodes-layer');

function nodeById(id) { return NODES.find(n => n.id === id); }

function edgeEndpoints(n1, n2) {
  const dx = n2.x - n1.x, dy = n2.y - n1.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const ux = dx/len, uy = dy/len;
  return { x1: n1.x + R*ux, y1: n1.y + R*uy, x2: n2.x - R*ux, y2: n2.y - R*uy };
}

// Build SVG elements once
const edgeEls = {};
const tauEls = {};

EDGES.forEach(([a, b]) => {
  const na = nodeById(a), nb = nodeById(b);
  const key = `${a}-${b}`;
  const ep = edgeEndpoints(na, nb);

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', ep.x1); line.setAttribute('y1', ep.y1);
  line.setAttribute('x2', ep.x2); line.setAttribute('y2', ep.y2);
  line.setAttribute('class', 'edef');
  line.id = `edge-${key}`;
  edgesLayer.appendChild(line);
  edgeEls[key] = line;

  // τ label at midpoint
  const mx = (na.x + nb.x) / 2, my = (na.y + nb.y) / 2;
  const tau = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  tau.setAttribute('x', mx); tau.setAttribute('y', my);
  tau.setAttribute('class', 'etau');
  tau.id = `tau-${key}`;
  edgesLayer.appendChild(tau);
  tauEls[key] = tau;
});

const nodeEls = {};
const labelEls = {};
const repEls = {};
const pulseEls = {};

NODES.forEach(n => {
  // Pulse ring (behind circle)
  const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  pulse.setAttribute('cx', n.x); pulse.setAttribute('cy', n.y); pulse.setAttribute('r', 26);
  pulse.setAttribute('class', 'pulse-ring'); pulse.setAttribute('stroke', 'var(--purple)');
  pulse.id = `pulse-${n.id}`;
  nodesLayer.appendChild(pulse);
  pulseEls[n.id] = pulse;

  // Node circle
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', n.x); circle.setAttribute('cy', n.y); circle.setAttribute('r', R);
  circle.setAttribute('class', 'ndef');
  circle.id = `node-${n.id}`;
  nodesLayer.appendChild(circle);
  nodeEls[n.id] = circle;

  // Node label
  const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lbl.setAttribute('x', n.x); lbl.setAttribute('y', n.y - 4);
  lbl.setAttribute('class', 'nlbl');
  lbl.textContent = `N${n.id}`;
  nodesLayer.appendChild(lbl);
  labelEls[n.id] = lbl;

  // Rep label (below node)
  const rep = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  rep.setAttribute('x', n.x); rep.setAttribute('y', n.y + 10);
  rep.setAttribute('class', 'nrep');
  rep.textContent = 'r=1.0';
  nodesLayer.appendChild(rep);
  repEls[n.id] = rep;
});

// ── Step Rendering ────────────────────────────────────────────────────────────
let currentStep = 0;

function renderStep(idx) {
  const step = STEPS[idx];

  // Reset all nodes
  NODES.forEach(n => {
    const cls = step.nodeClass[n.id] || 'ndef';
    nodeEls[n.id].setAttribute('class', cls);
    labelEls[n.id].setAttribute('class', `nlbl ${cls}`);
    pulseEls[n.id].setAttribute('class', 'pulse-ring');
    pulseEls[n.id].setAttribute('stroke', 'var(--purple)');
  });

  // Pulse ring for entry node highlight
  if (step.showPulse) {
    pulseEls[step.showPulse].setAttribute('class', 'pulse-ring go');
  }

  // Reset all edges
  EDGES.forEach(([a, b]) => {
    const key = `${a}-${b}`;
    const cls = step.edgeClass[key] || 'edef';
    edgeEls[key].setAttribute('class', cls);

    // Always show τ value; highlight (orange, bold) if in showTau
    const tauVal = (step.tauValues && step.tauValues[key] !== undefined) ? step.tauValues[key] : 1.0;
    tauEls[key].textContent = `τ=${tauVal.toFixed(3)}`;
    tauEls[key].setAttribute('class', step.showTau.includes(key) ? 'etau show' : 'etau');
  });

  // Update rep labels
  NODES.forEach(n => {
    const repVal = step.repValues[n.id];
    const old = 1.0; // baseline
    const changed = Math.abs(repVal - 1.0) > 0.001;
    repEls[n.id].textContent = `r=${repVal.toFixed(3)}`;
    repEls[n.id].setAttribute('class', changed ? 'nrep changed' : 'nrep');
  });

  // Render step panel
  document.getElementById('step-pane').innerHTML = step.html;

  // Update nav
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === STEPS.length - 1;
  document.getElementById('step-counter').textContent = `Step ${idx + 1} / ${STEPS.length}`;

  // Update dots
  document.querySelectorAll('.sdot').forEach((dot, i) => {
    dot.classList.toggle('active', i === idx);
  });
}

// ── Build dots ────────────────────────────────────────────────────────────────
const dotsContainer = document.getElementById('step-dots');
STEPS.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'sdot';
  dot.title = `Step ${i + 1}`;
  dot.onclick = () => { currentStep = i; renderStep(i); };
  dotsContainer.appendChild(dot);
});

// ── Navigation ────────────────────────────────────────────────────────────────
document.getElementById('prev-btn').onclick = () => { if (currentStep > 0) { currentStep--; renderStep(currentStep); } };
document.getElementById('next-btn').onclick = () => { if (currentStep < STEPS.length-1) { currentStep++; renderStep(currentStep); } };

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && currentStep < STEPS.length - 1) { currentStep++; renderStep(currentStep); }
  if (e.key === 'ArrowLeft'  && currentStep > 0)                { currentStep--; renderStep(currentStep); }
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderStep(0);
</script>
